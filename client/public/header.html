<!-- header.html – Fixed Dropdown with Absolute URL Support -->
<header>
    <div class="logo" id="homeLink">
        <i class="fas fa-ticket-alt"></i>
        <span>Soldout.com</span>
    </div>
    <div class="nav-links">
        <a href="index.html" class="active home-link">Home</a>
        <a href="gallery.html">Movies</a>
        <a href="series.html">TV Shows</a>
        <a href="#">New Releases</a>
        <a href="soundtracks.html">Soundtracks</a>
    </div>
    <div class="user-actions">
        <i class="fas fa-search search-icon"></i>
        <i class="fas fa-bell"></i>
        <div class="user-info" id="userInfo" style="position: relative; cursor: pointer;">
            <div class="user-avatar-container" id="userAvatar">
                <i class="fas fa-user-circle user-icon"></i>
            </div>
            <span class="user-name" id="userNameDisplay"></span>
            <div class="user-dropdown" id="userDropdown">
                <a href="profile.html"><i class="fas fa-user"></i> Account</a>
                <a href="upload.html" id="uploadLink"><i class="fas fa-upload"></i> Upload</a>
                <a href="#"><i class="fas fa-tv"></i> My Watchlist</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </div>
</header>

<script>
    // ----- GLOBAL HELPER: convert relative URL to absolute -----
    function getAbsoluteUrl(url) {
        if (!url) return null;
        if (url.startsWith('http://') || url.startsWith('https://')) return url;
        return url.startsWith('/') ? `${window.location.origin}${url}` : `${window.location.origin}/${url}`;
    }

    function getCurrentUser() {
        const userData = localStorage.getItem('currentUser');
        return userData ? JSON.parse(userData) : null;
    }

    function updateUserState(user) {
        const avatarContainer = document.getElementById('userAvatar');
        const userNameSpan = document.getElementById('userNameDisplay');

        if (user) {
            if (user.profilePicture) {
                const picUrl = getAbsoluteUrl(user.profilePicture);
                avatarContainer.innerHTML = `<img src="${picUrl}" alt="${user.firstName}">`;
            } else {
                avatarContainer.innerHTML = `<i class="fas fa-user-circle user-icon"></i>`;
            }
            userNameSpan.textContent = `${user.firstName} ${user.lastName}`;
        } else {
            avatarContainer.innerHTML = `<i class="fas fa-user-circle user-icon"></i>`;
            userNameSpan.textContent = '';
        }
    }

    // Run immediately when header is inserted (for pages that fetch this file)
    function initHeader() {
        const user = getCurrentUser();
        updateUserState(user);

        const userInfo = document.getElementById('userInfo');
        const dropdown = document.getElementById('userDropdown');

        userInfo.addEventListener('click', function (e) {
            e.stopPropagation();
            const currentUser = getCurrentUser();
            if (currentUser) {
                dropdown.classList.toggle('show');
            } else {
                const loginOverlay = document.getElementById('loginOverlay');
                if (loginOverlay) {
                    loginOverlay.classList.add('active');
                } else {
                    window.location.href = 'index.html';
                }
            }
        });

        document.addEventListener('click', function () {
            dropdown.classList.remove('show');
        });

        document.getElementById('logoutBtn').addEventListener('click', function (e) {
            e.preventDefault();
            localStorage.removeItem('currentUser');
            localStorage.removeItem('authToken');
            window.location.href = 'index.html';
        });
    }

    // Ensure it runs regardless of DOM state
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initHeader);
    } else {
        initHeader();
    }
</script>
