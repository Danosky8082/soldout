<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soldout.com - SoundTrack Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/global.css">
</head>

<body>
    <div class="container">
        <div id="header-container"></div>
        <input type="text" id="videoSearch" placeholder="Search in SoundTrack Gallery by Title or Genre...">
        <h2 class="section-title"><i class="fas fa-video"></i> SoundTrack Gallery</h2>
        <div class="video-grid" id="videoGallery">
            <div class="spinner" id="videoSpinner"></div>
        </div>
    </div>
    <footer>
        <div class="footer-links"><a href="admin.html">
                <font color="green">Admin</font>
            </a> | <a href="#">About Us</a> | <a href="#">Contact</a> | <a href="#">Privacy Policy</a> | <a
                href="#">Terms of Service</a> | <a href="#">Help Center</a></div>
        <p>&copy; 2025 Soldout.com. All rights reserved.</p>
    </footer>

    <script>
        // ============================================================
        // 1. LOAD HEADER
        // ============================================================
        async function loadHeader() {
            try {
                const response = await fetch('header.html');
                const html = await response.text();
                const container = document.getElementById('header-container');
                container.innerHTML = html;

                const scriptTags = container.querySelectorAll('script');
                scriptTags.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    if (oldScript.src) newScript.src = oldScript.src;
                    else newScript.textContent = oldScript.textContent;
                    document.head.appendChild(newScript);
                    oldScript.remove();
                });

                if (typeof window.updateUserState === 'function') {
                    const user = window.getCurrentUser ? window.getCurrentUser() : null;
                    window.updateUserState(user);
                }
                initializeGallery();
            } catch (err) {
                console.error('Error loading header:', err);
            }
        }

        // ============================================================
        // 2. SOUNDTRACK GALLERY LOGIC
        // ============================================================
        const API_BASE_URL = 'https://soldout-jh33.onrender.com/api';
        const STATIC_BASE_URL = 'https://soldout-jh33.onrender.com';

        function getAbsoluteUrl(url) {
            if (typeof window.getAbsoluteUrl === 'function') return window.getAbsoluteUrl(url);
            if (!url) return null;
            if (url.startsWith('http://') || url.startsWith('https://')) return url;
            const clean = url.startsWith('/') ? url.slice(1) : url;
            return `${STATIC_BASE_URL}/${clean}`;
        }

        function filterVideos(videos) {
            if (!videos || !Array.isArray(videos)) return [];
            return videos.filter(video => {
                if (!video || !video.genre) return true;
                const genre = video.genre.toLowerCase();
                return genre.includes('soundtrack') || genre.includes('musical');
            });
        }

        async function loadVideos() {
            const gallery = document.getElementById('videoGallery');
            gallery.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await fetch(`${API_BASE_URL}/videos/premium`);
                if (!response.ok) throw new Error(`Server returned ${response.status}`);
                const videos = await response.json();
                const filtered = filterVideos(videos);
                renderVideos(filtered);
            } catch (error) {
                console.error('Failed to fetch videos:', error);
                gallery.innerHTML = `<div class="alert alert-danger">Error loading videos: ${error.message}</div>`;
            }
        }

        function renderVideos(videos) {
            const gallery = document.getElementById('videoGallery');
            gallery.innerHTML = '';
            if (!videos || videos.length === 0) {
                gallery.innerHTML = '<div class="alert alert-info">No videos found</div>';
                return;
            }
            videos.forEach(video => {
                if (!video || !video.id) return;
                const thumb = getAbsoluteUrl(video.thumbnail) || 'https://via.placeholder.com/300x169?text=No+Thumb';
                const vidUrl = getAbsoluteUrl(video.videoUrl);
                const uploaderName = video.user?.firstName ? `${video.user.firstName} ${video.user.lastName || ''}`.trim() : 'Unknown';

                const div = document.createElement('div');
                div.className = 'video-item';
                div.innerHTML = `
                    <div class="thumbnail-container">
                        <img class="video-thumbnail" src="${thumb}" alt="${video.title}" onerror="this.src='https://via.placeholder.com/300x169?text=Thumbnail+Error'">
                        ${vidUrl ? `<video class="video-preview" muted loop playsinline><source src="${vidUrl}" type="video/mp4"></video>` : ''}
                    </div>
                    <div class="video-info">
                        <div class="channel-icon"><i class="fas fa-user"></i></div>
                        <div class="video-details">
                            <h3 class="video-title">${video.title || 'Untitled'}</h3>
                            <div class="video-meta">
                                <span class="channel-name">${uploaderName}</span>
                                <div class="views-age">
                                    <span>${video.views || 0} views</span>
                                    <span>•</span>
                                    <span>${video.year || 'Unknown year'}</span>
                                </div>
                                <span class="genre">${video.genre || 'Unknown genre'}</span>
                            </div>
                        </div>
                    </div>
                `;

                const preview = div.querySelector('.video-preview');
                if (preview) {
                    div.addEventListener('mouseenter', () => {
                        preview.currentTime = 0;
                        const p = preview.play();
                        if (p) p.catch(e => { if (e.name !== 'AbortError') console.warn(e); });
                    });
                    div.addEventListener('mouseleave', () => { if (!preview.paused) preview.pause(); });
                }

                div.addEventListener('click', () => {
                    sessionStorage.setItem('currentVideo', JSON.stringify(video));
                    window.location.href = 'video-player.html';
                });

                gallery.appendChild(div);
            });
        }

        function initializeGallery() {
            loadVideos();
            document.getElementById('videoSearch').addEventListener('input', function () {
                const query = this.value.toLowerCase().trim();
                const items = document.querySelectorAll('.video-item');
                let hasResults = false;
                items.forEach(item => {
                    const title = item.querySelector('.video-title').textContent.toLowerCase();
                    const genre = item.querySelector('.genre')?.textContent.toLowerCase() || '';
                    if (title.includes(query) || genre.includes(query)) {
                        item.style.display = 'block';
                        hasResults = true;
                    } else {
                        item.style.display = 'none';
                    }
                });
                if (!hasResults && query) {
                    const noResults = document.createElement('div');
                    noResults.className = 'alert alert-info';
                    noResults.textContent = 'No videos match your search';
                    document.getElementById('videoGallery').appendChild(noResults);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', loadHeader);
    </script>
</body>

</html>
