<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soldout.com - Video Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/global.css">
    <!-- ✅ Add favicon here -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="header.js" defer></script>
</head>

<body>
    <div class="container">
        <!-- ===== HARDCODED HEADER ===== -->
        <header>
            <button class="hamburger" id="hamburgerBtn" aria-label="Toggle sidebar">
                <span></span><span></span><span></span>
            </button>
            <div class="logo" id="homeLink">
                <i class="fas fa-ticket-alt"></i>
                <span>Soldout.com</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="gallery.html">Movies</a>
                <a href="series.html">TV Shows</a>
                <a href="#">New Releases</a>
                <a href="soundtracks.html">Soundtracks</a>
            </div>
            <div class="user-actions">
                <i class="fas fa-search search-icon"></i>
                <i class="fas fa-bell"></i>
                <div class="user-info" id="userInfo" style="position: relative; cursor: pointer;">
                    <div class="user-avatar-container" id="userAvatar">
                        <i class="fas fa-user-circle user-icon"></i>
                    </div>
                    <span class="user-name" id="userNameDisplay"></span>
                    <div class="user-dropdown" id="userDropdown">
                        <a href="profile.html"><i class="fas fa-user"></i> Account</a>
                        <a href="upload.html" id="uploadLink"><i class="fas fa-upload"></i> Upload</a>
                        <a href="#"><i class="fas fa-tv"></i> My Watchlist</a>
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- ===== SIDEBAR CONTAINER ===== -->
        <div id="sidebar-container"></div>

        <!-- Page content -->
        <input type="text" id="videoSearch" placeholder="Search in Video Gallery by Title or Genre...">
        <h2 class="section-title"><i class="fas fa-video"></i> Video Gallery</h2>
        <div class="video-grid" id="videoGallery">
            <div class="spinner" id="videoSpinner"></div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="admin.html">
                <font color="green">Admin</font>
            </a> |
            <a href="#">About Us</a> |
            <a href="#">Contact</a> |
            <a href="#">Privacy Policy</a> |
            <a href="#">Terms of Service</a> |
            <a href="#">Help Center</a>
        </div>
        <p>&copy; 2025 Soldout.com. All rights reserved.</p>
    </footer>

    <script>
        // ============================================================
        // LOAD SIDEBAR
        // ============================================================
        async function loadSidebar() {
            try {
                const response = await fetch('sidebar.html');
                const html = await response.text();
                document.getElementById('sidebar-container').innerHTML = html;

                const hamburger = document.getElementById('hamburgerBtn');
                const sidebar = document.getElementById('sidebarMobile');
                const overlay = document.getElementById('sidebarOverlay');

                if (hamburger && sidebar && overlay) {
                    function toggleSidebar(open) {
                        const isOpen = open !== undefined ? open : !sidebar.classList.contains('open');
                        sidebar.classList.toggle('open', isOpen);
                        overlay.classList.toggle('active', isOpen);
                        hamburger.classList.toggle('active', isOpen);
                        document.body.style.overflow = isOpen ? 'hidden' : '';
                    }
                    hamburger.addEventListener('click', function (e) {
                        e.stopPropagation();
                        toggleSidebar();
                    });
                    overlay.addEventListener('click', function () {
                        toggleSidebar(false);
                    });
                    sidebar.querySelectorAll('a').forEach(function (link) {
                        link.addEventListener('click', function () {
                            toggleSidebar(false);
                        });
                    });
                    document.addEventListener('keydown', function (e) {
                        if (e.key === 'Escape' && sidebar.classList.contains('open')) {
                            toggleSidebar(false);
                        }
                    });
                    window.addEventListener('resize', function () {
                        if (window.innerWidth > 992 && sidebar.classList.contains('open')) {
                            toggleSidebar(false);
                        }
                    });
                }
            } catch (err) {
                console.error('Error loading sidebar:', err);
            }
        }

        // ============================================================
        // GALLERY LOGIC (unchanged)
        // ============================================================
        const API_BASE_URL = 'https://soldout-jh33.onrender.com/api';
        const STATIC_BASE_URL = 'https://soldout-jh33.onrender.com';

        function getAbsoluteUrl(url) {
            if (typeof window.getAbsoluteUrl === 'function') return window.getAbsoluteUrl(url);
            if (!url) return null;
            if (url.startsWith('http://') || url.startsWith('https://')) return url;
            const clean = url.startsWith('/') ? url.slice(1) : url;
            return `${STATIC_BASE_URL}/${clean}`;
        }

        function filterVideos(videos) {
            if (!videos || !Array.isArray(videos)) return [];
            return videos.filter(video => {
                if (!video || !video.genre) return true;
                const genre = video.genre.toLowerCase();
                return !(genre.includes('musical') || genre.includes('series') || genre.includes('soundtrack'));
            });
        }

        async function loadVideos() {
            const gallery = document.getElementById('videoGallery');
            gallery.innerHTML = '<div class="spinner"></div>';
            try {
                const response = await fetch(`${API_BASE_URL}/videos/premium`);
                if (!response.ok) throw new Error(`Server returned ${response.status}`);
                const videos = await response.json();
                const filtered = filterVideos(videos);
                renderVideos(filtered);
            } catch (error) {
                console.error('Failed to fetch videos:', error);
                gallery.innerHTML = `<div class="alert alert-danger">Error loading videos: ${error.message}</div>`;
            }
        }

        function renderVideos(videos) {
            const gallery = document.getElementById('videoGallery');
            gallery.innerHTML = '';
            if (!videos || videos.length === 0) {
                gallery.innerHTML = '<div class="alert alert-info">No videos found</div>';
                return;
            }
            videos.forEach(video => {
                if (!video || !video.id) return;
                const thumb = getAbsoluteUrl(video.thumbnail) || 'https://via.placeholder.com/300x169?text=No+Thumb';
                const vidUrl = getAbsoluteUrl(video.videoUrl);
                const uploaderName = video.user?.firstName ? `${video.user.firstName} ${video.user.lastName || ''}`.trim() : 'Unknown';

                const div = document.createElement('div');
                div.className = 'video-item';
                div.innerHTML = `
                    <div class="thumbnail-container">
                        <img class="video-thumbnail" src="${thumb}" alt="${video.title}" onerror="this.src='https://via.placeholder.com/300x169?text=Thumbnail+Error'">
                        ${vidUrl ? `<video class="video-preview" muted loop playsinline><source src="${vidUrl}" type="video/mp4"></video>` : ''}
                    </div>
                    <div class="video-info">
                        <div class="channel-icon"><i class="fas fa-user"></i></div>
                        <div class="video-details">
                            <h3 class="video-title">${video.title || 'Untitled'}</h3>
                            <div class="video-meta">
                                <span class="channel-name">${uploaderName}</span>
                                <div class="views-age">
                                    <span>${video.views || 0} views</span>
                                    <span>•</span>
                                    <span>${video.year || 'Unknown year'}</span>
                                </div>
                                <span class="genre">${video.genre || 'Unknown genre'}</span>
                            </div>
                        </div>
                    </div>
                `;

                const preview = div.querySelector('.video-preview');
                if (preview) {
                    div.addEventListener('mouseenter', () => {
                        preview.currentTime = 0;
                        const p = preview.play();
                        if (p) p.catch(e => { if (e.name !== 'AbortError') console.warn(e); });
                    });
                    div.addEventListener('mouseleave', () => {
                        if (!preview.paused) preview.pause();
                    });
                }

                div.addEventListener('click', () => {
                    sessionStorage.setItem('currentVideo', JSON.stringify(video));
                    window.location.href = 'video-player.html';
                });

                gallery.appendChild(div);
            });
        }

        function initializeGallery() {
            loadVideos();
            document.getElementById('videoSearch').addEventListener('input', function () {
                const query = this.value.toLowerCase().trim();
                const items = document.querySelectorAll('.video-item');
                let hasResults = false;
                items.forEach(item => {
                    const title = item.querySelector('.video-title').textContent.toLowerCase();
                    const genre = item.querySelector('.genre')?.textContent.toLowerCase() || '';
                    if (title.includes(query) || genre.includes(query)) {
                        item.style.display = 'block';
                        hasResults = true;
                    } else {
                        item.style.display = 'none';
                    }
                });
                if (!hasResults && query) {
                    const noResults = document.createElement('div');
                    noResults.className = 'alert alert-info';
                    noResults.textContent = 'No videos match your search';
                    document.getElementById('videoGallery').appendChild(noResults);
                }
            });
        }

        // ============================================================
        // START
        // ============================================================
        document.addEventListener('DOMContentLoaded', async function () {
            await loadSidebar();
            if (typeof window.initHeader === 'function') window.initHeader();
            initializeGallery();
        });
    </script>
</body>

</html>
